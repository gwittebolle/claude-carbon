<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>claude-carbon social preview</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1280px;
        height: 640px;
        overflow: hidden;
        background: #000;
      }

      .stage {
        position: relative;
        width: 1280px;
        height: 640px;
        overflow: hidden;
        background: radial-gradient(
          ellipse 900px 500px at 50% 38%,
          #131313 0%,
          #000 75%
        );
      }

      .label {
        position: absolute;
        top: 52px;
        left: 64px;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
        font-weight: 600;
        letter-spacing: 0.18em;
        font-size: 15px;
        text-transform: uppercase;
        opacity: 0.85;
      }

      .logo {
        position: absolute;
        top: 40px;
        right: 60px;
        width: 60px;
        height: 60px;
        border-radius: 12px;
        background: url("../exports/logo-w.png") center/cover no-repeat;
      }

      .terminal {
        position: absolute;
        left: 50%;
        top: 150px;
        transform: translateX(-50%);
        width: 1140px;
        background: #1a1a1a;
        border-radius: 14px;
        box-shadow:
          0 30px 80px rgba(0, 0, 0, 0.7),
          0 10px 30px rgba(0, 0, 0, 0.5),
          inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        overflow: hidden;
        font-family: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
      }

      .titlebar {
        display: flex;
        align-items: center;
        padding: 13px 18px;
        background: #2a2a2a;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .dots {
        display: flex;
        gap: 8px;
      }
      .dot {
        width: 13px;
        height: 13px;
        border-radius: 50%;
      }
      .dot.red {
        background: #ff5f57;
      }
      .dot.yellow {
        background: #febc2e;
      }
      .dot.green {
        background: #28c840;
      }

      .titlebar-text {
        flex: 1;
        text-align: center;
        color: #a0a0a0;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .body {
        padding: 32px 36px 30px 36px;
        background: #0d0d0d;
      }

      .prompt {
        color: #bdbdbd;
        font-size: 25px;
        line-height: 1;
        margin-bottom: 26px;
        font-weight: 400;
      }
      .prompt .caret {
        display: inline-block;
        width: 12px;
        height: 21px;
        background: #bdbdbd;
        vertical-align: -3px;
        margin-left: 6px;
      }

      .statusline {
        color: #dcdcdc;
        font-size: 19px;
        line-height: 1.3;
        font-weight: 500;
        white-space: nowrap;
        overflow: visible;
      }

      .statusline .sep {
        color: #6a6a6a;
        margin: 0 9px;
      }
      .statusline .dim {
        color: #8a8a8a;
      }
      .statusline .green-dot {
        color: #28c840;
      }
      .statusline .co2 {
        color: #7ee38b;
      }
      .statusline .bar-full {
        color: #e8e8e8;
        letter-spacing: -1px;
      }
      .statusline .bar-empty {
        color: #4a4a4a;
        letter-spacing: -1px;
      }

      .tagline {
        position: absolute;
        left: 50%;
        top: 442px;
        transform: translateX(-50%);
        width: 1000px;
        text-align: center;
        color: #f2f2f2;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
        font-size: 40px;
        font-weight: 650;
        letter-spacing: -0.01em;
        line-height: 1.2;
      }

      .subline {
        position: absolute;
        left: 50%;
        top: 508px;
        transform: translateX(-50%);
        color: #9a9a9a;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
        font-size: 21px;
        font-weight: 450;
      }

      .watermark {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.55);
        font-family: "JetBrains Mono", monospace;
        font-size: 15px;
        letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="label">CLAUDE-CARBON</div>
      <div class="logo"></div>

      <div class="terminal">
        <div class="titlebar">
          <div class="dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
          </div>
          <div class="titlebar-text">claude-carbon - ~/code/claude-carbon</div>
          <div style="width: 57px"></div>
        </div>
        <div class="body">
          <div class="prompt">&gt;<span class="caret"></span></div>
          <div class="statusline">
            claude-carbon <span class="dim">⌥</span> main
            <span class="sep">|</span> <span class="green-dot">●</span> Opus 4.7
            <span class="bar-full">▓▓▓</span
            ><span class="bar-empty">░░░░░░░</span> 35%
            <span class="sep">|</span> $1.72 · <span class="co2">101g CO₂</span>
            <span class="sep">|</span> Use 21% <span class="dim">↻</span>13:00
          </div>
        </div>
      </div>

      <div class="tagline">
        Track the carbon footprint of your Claude Code sessions
      </div>
      <div class="subline">
        Live status line · local SQLite · reproducible methodology
      </div>

      <div class="watermark">github.com/gwittebolle/claude-carbon</div>
    </div>
  </body>
</html>
